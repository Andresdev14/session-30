<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | School Admin</title>
    <link rel="stylesheet" href="/src/shared/css/dashboard.css" />
  </head>
  <body>
    <main class="dashboard-page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Panel escolar</p>
          <h1>Resumen</h1>
          <p class="subtitle">Total de estudiantes y acudientes en el sistema.</p>
        </div>
        <div class="page-actions">
          <a class="button secondary-button" href="../students/students.html">Estudiantes</a>
          <a class="button secondary-button" href="../guardians/guardians.html">Acudientes</a>
          <a class="button secondary-button" href="../payments/payments.html">Pagos</a>
          <button id="logoutBtn" class="button danger-button">Cerrar sesión</button>
        </div>
      </header>

      <section class="metric-grid">
        <article class="metric-card">
          <span class="metric-value" id="studentsCount">0</span>
          <p class="metric-label">Estudiantes</p>
        </article>

        <article class="metric-card">
          <span class="metric-value" id="guardiansCount">0</span>
          <p class="metric-label">Acudientes</p>
        </article>
      </section>

      <section class="info-card">
        <h2>Accesos rápidos</h2>
        <div class="quick-actions">
          <a href="../students/students.html" class="button primary-button">Ver estudiantes</a>
          <a href="../guardians/guardians.html" class="button primary-button">Ver acudientes</a>
          <a href="../payments/payments.html" class="button primary-button">Registrar pago</a>
        </div>
      </section>
    </main>

    <script type="module" src="/src/shared/js/dashboard.js"></script>
  </body>
</html>
