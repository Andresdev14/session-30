<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagos | School Admin</title>
    <link rel="stylesheet" href="/src/pages/payments/payments.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Pagos</p>
          <h1>Transacciones</h1>
          <p class="subtitle">Revisa y registra los pagos escolares.</p>
        </div>
        <div class="page-actions">
          <a class="button secondary-button" href="../dashboard/dashboard.html">Dashboard</a>
          <a class="button secondary-button" href="../students/students.html">Estudiantes</a>
          <a class="button secondary-button" href="../guardians/guardians.html">Acudientes</a>
        </div>
      </header>

      <section class="stats-grid">
        <article class="stat-card">
          <p class="stat-label">Total de pagos</p>
          <strong id="paymentsTotal" class="stat-value">0</strong>
        </article>
        <article class="stat-card">
          <p class="stat-label">Cuentas pendientes</p>
          <strong id="pendingTotal" class="stat-value">0</strong>
        </article>
      </section>

      <section class="table-card">
        <h2>Lista de pagos</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Estudiante</th>
                <th>Monto</th>
                <th>Método</th>
                <th>Referencia</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="paymentsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="form-card">
        <h2>Registrar pago</h2>
        <div id="paymentMessage" class="message" hidden></div>
        <form id="paymentForm" class="form-grid">
          <label class="form-label">
            Cuenta por cobrar
            <select id="paymentAccountId" required>
              <option value="">Selecciona una cuenta</option>
            </select>
          </label>
          <label class="form-label">
            Monto
            <input id="paymentAmount" type="number" step="0.01" min="0" required />
          </label>
          <label class="form-label">
            Método de pago
            <select id="paymentMethod" required>
              <option value="">Selecciona método</option>
              <option value="efectivo">Efectivo</option>
              <option value="transferencia">Transferencia</option>
              <option value="tarjeta">Tarjeta</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
          <label class="form-label">
            Referencia
            <input id="paymentReference" type="text" />
          </label>
          <div class="form-actions">
            <button type="submit" class="button primary-button">Guardar pago</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/src/pages/payments/payments.js"></script>
  </body>
</html>
